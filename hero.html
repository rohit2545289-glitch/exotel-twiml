<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Info</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        .header .icon { font-size: 50px; }
        .header h1 { color: #333; }
        .header .sub { color: #999; font-size: 13px; }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid #f5f5f5;
        }
        .label { color: #777; font-weight: 600; }
        .value { color: #333; font-weight: 500; }
        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:active { transform: scale(0.97); }
        .footer { text-align: center; color: #bbb; font-size: 11px; margin-top: 12px; }
        .loading { color: #999; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">📱</div>
            <h1>Device Info</h1>
            <div class="sub">🔍 Your device details</div>
        </div>
        
        <div id="info">
            <div class="info-item">
                <span class="label">📱 Device</span>
                <span class="value" id="device"><span class="loading">Loading...</span></span>
            </div>
            <div class="info-item">
                <span class="label">🤖 OS</span>
                <span class="value" id="os"><span class="loading">Loading...</span></span>
            </div>
            <div class="info-item">
                <span class="label">🌐 Browser</span>
                <span class="value" id="browser"><span class="loading">Loading...</span></span>
            </div>
            <div class="info-item">
                <span class="label">📐 Screen</span>
                <span class="value" id="screen"><span class="loading">Loading...</span></span>
            </div>
            <div class="info-item">
                <span class="label">📶 IP</span>
                <span class="value" id="ip"><span class="loading">Loading...</span></span>
            </div>
            <div class="info-item">
                <span class="label">🔋 Battery</span>
                <span class="value" id="battery"><span class="loading">Loading...</span></span>
            </div>
            <div class="info-item">
                <span class="label">📍 Location</span>
                <span class="value" id="location"><span class="loading">Loading...</span></span>
            </div>
            <div class="info-item">
                <span class="label">⏰ Time</span>
                <span class="value" id="time"><span class="loading">Loading...</span></span>
            </div>
        </div>
        
        <button class="btn" onclick="shareInfo()">📤 Share Device Info</button>
        <div class="footer">🔒 Private</div>
    </div>

    <script>
        async function getDeviceInfo() {
            const ua = navigator.userAgent;
            
            let device = 'Unknown';
            if (ua.includes('Android')) device = 'Android';
            else if (ua.includes('iPhone')) device = 'iPhone';
            else if (ua.includes('Windows')) device = 'Windows';
            else if (ua.includes('Mac')) device = 'Mac';
            document.getElementById('device').textContent = device;
            
            let os = 'Unknown';
            if (ua.includes('Android')) {
                const m = ua.match(/Android (\d+\.\d+)/);
                os = m ? 'Android ' + m[1] : 'Android';
            } else if (ua.includes('iPhone OS')) {
                const m = ua.match(/iPhone OS (\d+)_(\d+)/);
                os = m ? 'iOS ' + m[1] + '.' + m[2] : 'iOS';
            } else if (ua.includes('Windows NT 10.0')) {
                os = 'Windows 10';
            } else if (ua.includes('Mac OS X')) {
                os = 'macOS';
            }
            document.getElementById('os').textContent = os;
            
            let browser = 'Unknown';
            if (ua.includes('Chrome') && !ua.includes('Edg')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
            else if (ua.includes('Edg')) browser = 'Edge';
            document.getElementById('browser').textContent = browser;
            
            document.getElementById('screen').textContent = screen.width + '×' + screen.height + 'px';
            
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                document.getElementById('ip').textContent = d.ip || 'Unknown';
            } catch(e) {
                document.getElementById('ip').textContent = 'Not available';
            }
            
            if (navigator.getBattery) {
                try {
                    const b = await navigator.getBattery();
                    document.getElementById('battery').textContent = Math.round(b.level * 100) + '%';
                } catch(e) {
                    document.getElementById('battery').textContent = 'Not available';
                }
            }
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => {
                        document.getElementById('location').textContent = p.coords.latitude.toFixed(4) + ', ' + p.coords.longitude.toFixed(4);
                    },
                    () => {
                        document.getElementById('location').textContent = 'Not allowed';
                    }
                );
            }
            
            updateTime();
            setInterval(updateTime, 10000);
        }
        
        function updateTime() {
            document.getElementById('time').textContent = new Date().toLocaleString();
        }
        
        function shareInfo() {
            const text = '📱 Device Info\n' +
                'Device: ' + document.getElementById('device').textContent + '\n' +
                'OS: ' + document.getElementById('os').textContent + '\n' +
                'Browser: ' + document.getElementById('browser').textContent + '\n' +
                'Screen: ' + document.getElementById('screen').textContent + '\n' +
                'IP: ' + document.getElementById('ip').textContent + '\n' +
                'Battery: ' + document.getElementById('battery').textContent + '\n' +
                'Location: ' + document.getElementById('location').textContent + '\n' +
                'Time: ' + document.getElementById('time').textContent;
            
            if (navigator.share) {
                navigator.share({ title: 'Device Info', text: text });
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    alert('📋 Copied to clipboard!');
                });
            }
        }
        
        getDeviceInfo();
    </script>
</body>
</html>
